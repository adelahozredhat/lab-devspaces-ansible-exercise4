version: 3

build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: '--pre'

options:
  package_manager_path: /usr/bin/microdnf
  
dependencies:
  galaxy:
    collections:
      - ansible.posix
      - ansible.utils
      - community.general
      - kubernetes.core          # Requerido para módulos k8s

  python:
    - kubernetes                # Librería base de Python para K8s
    - pyyaml                    # Requerido para procesar manifiestos
    - jsonpatch                 # Requerido para operaciones de patch

  system:
    - tar                       # Útil para la extracción de binarios si fuera necesario
    - gzip
    - openshift-clients ignore

images:
  base_image:
    name: quay.io/adelahoz/ee_cap_aap_2.6:latest

additional_build_steps:
  prepend_base:
    - ENV PIP_BREAK_SYSTEM_PACKAGES=1
  append_final:
    - RUN curl -L https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz | tar -xvzf - -C /usr/bin/ oc kubectl